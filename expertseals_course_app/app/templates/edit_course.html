{% extends 'base.html' %}

{% block title %}Edit Course - ExpertSeals{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Edit Course</h2>
    </div>
    
    <form method="post">
        <div class="form-group">
            <label for="title">Course Title</label>
            <input type="text" id="title" name="title" value="{{ course.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="instructor">Instructor</label>
            <input type="text" id="instructor" name="instructor" value="{{ course.instructor }}" required>
        </div>
        
        <div class="form-group">
            <label for="duration">Duration (hours)</label>
            <input type="number" id="duration" name="duration" value="{{ course.duration_hours }}" min="1" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ course.description or '' }}</textarea>
        </div>
        
        <div>
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{{ url_for('main.view_course', course_id=course.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
